# ============================================================
# AQI Intelligent Forecasting & Health Advisory System
# Single-City Deployment: ISLAMABAD, PAKISTAN
# ============================================================
# NOTE: All secrets are loaded from .env at runtime.
# This file is SAFE to commit to git.

# --- API Configuration ---
api:
  aqicn:
    base_url: "https://api.waqi.info"
    api_key: "ENV"                         # Loaded from .env → AQICN_API_KEY
    rate_limit_per_day: 1000
  open_meteo:
    forecast_url: "https://api.open-meteo.com/v1/forecast"
    archive_url: "https://archive-api.open-meteo.com/v1/archive"
    # No API key required — Open-Meteo is free and open-source
    hourly_params: "temperature_2m,relativehumidity_2m,windspeed_10m,surface_pressure"

# --- Target City (Single-City System) ---
city:
  name: "Islamabad"
  id: "islamabad"
  lat: 33.6844
  lon: 73.0479

# --- Data Paths ---
paths:
  raw_data: "data/raw"
  processed_data: "data/processed"
  feast_data: "data/feast"
  cache: "data/cache"
  models: "models"
  logs: "logs"
  plots: "plots"

# --- Resilience Settings ---
resilience:
  max_retries: 3
  base_backoff_seconds: 2
  request_timeout_seconds: 30
  circuit_breaker:
    failure_threshold: 5
    cooldown_seconds: 300

# --- Hopsworks Feature Store (Cloud-based) ---
hopsworks:
  project_name: "aqi_forecasting"
  host: "https://us-east-1.app.hopsworks.ai"
  # API key loaded from .env → HOPSWORKS_API_KEY
  # If not set, features will use Parquet fallback (local storage)

# --- Feature Engineering ---
features:
  rolling_windows: [6, 12, 24]
  lag_hours: [1, 3, 6, 12, 24]

# --- Training ---
training:
  test_size: 0.2
  random_state: 42
  forecast_horizons: [24, 48, 72]  # 24h, 48h, 72h forecast horizons
  min_samples_required: 50
  models:
    ridge:
      alpha: 1.0
    random_forest:
      n_estimators: 100
      max_depth: 10
      min_samples_split: 5
    xgboost:
      n_estimators: 200
      max_depth: 6
      learning_rate: 0.1
      subsample: 0.8

# --- Health Advisory Thresholds ---
health_advisory:
  levels:
    - range: [0, 50]
      level: "Good"
      color: "green"
      advice: "Air quality is satisfactory. Enjoy outdoor activities."
    - range: [51, 100]
      level: "Moderate"
      color: "yellow"
      advice: "Acceptable. Sensitive individuals should reduce prolonged outdoor exertion."
    - range: [101, 150]
      level: "Unhealthy for Sensitive Groups"
      color: "orange"
      advice: "Wear masks outdoors. Reduce prolonged outdoor exertion."
    - range: [151, 200]
      level: "Unhealthy"
      color: "red"
      advice: "Everyone may experience health effects. Avoid prolonged outdoor exertion."
    - range: [201, 300]
      level: "Very Unhealthy"
      color: "purple"
      advice: "Health alert: Avoid all outdoor activities. Stay indoors."
    - range: [301, 500]
      level: "Hazardous"
      color: "maroon"
      advice: "Health emergency: Stay indoors, seal windows, use air purifiers."

# --- Drift Detection ---
drift:
  ks_threshold: 0.1
  min_samples: 30

# --- Alerting (SMTP) ---
alerting:
  enabled: false
  smtp_server: "smtp.gmail.com"
  smtp_port: 587
  sender_email: "ENV"                   # Loaded from .env → SENDER_EMAIL
  sender_password: "ENV"                 # Loaded from .env → SENDER_PASSWORD
  recipients:
    - "recipient@example.com"
  aqi_alert_threshold: 200

# --- Logging ---
logging:
  level: "INFO"
  format: "%(asctime)s | %(name)-25s | %(levelname)-8s | %(message)s"
  file_enabled: true

# --- Dynamic Schema Mapping Layer ---
schema_mapping:
  timestamp: ["timestamp", "time", "dt", "datetime", "data.time.iso"]
  aqi: ["aqi", "data.aqi"]
  dominant_pollutant: ["dominant_pollutant", "data.dominentpol", "dominentpol"]
  pm25: ["pm25", "data.iaqi.pm25.v", "iaqi.pm25.v", "pm2_5"]
  pm10: ["pm10", "data.iaqi.pm10.v", "iaqi.pm10.v", "pm10_v"]
  o3: ["o3", "data.iaqi.o3.v", "iaqi.o3.v", "o3_v"]
  no2: ["no2", "data.iaqi.no2.v", "iaqi.no2.v", "no2_v"]
  so2: ["so2", "data.iaqi.so2.v", "iaqi.so2.v", "so2_v"]
  co: ["co", "data.iaqi.co.v", "iaqi.co.v", "co_v"]
  station_name: ["station_name", "data.city.name", "city.name", "city"]
  time: ["time", "hourly.time"]
  temperature: ["temperature", "temperature_2m", "temp", "hourly.temperature_2m"]
  humidity: ["humidity", "relativehumidity_2m", "relative_humidity", "hourly.relativehumidity_2m"]
  pressure: ["pressure", "surface_pressure", "barometer", "hourly.surface_pressure"]
  wind_speed: ["wind_speed", "windspeed_10m", "wind", "hourly.windspeed_10m"]

# --- Dynamic Cleaning & Pluggable Outlier Rules ---
cleaning_rules:
  aqi:
    outlier_method: "iqr"
    min: 0
    max: 500
  pm25:
    outlier_method: "iqr"
    min: 0
    max: 1000
  pm10:
    outlier_method: "iqr"
    min: 0
    max: 1000
  o3:
    outlier_method: "iqr"
    min: 0
    max: 600
  no2:
    outlier_method: "iqr"
    min: 0
    max: 500
  so2:
    outlier_method: "iqr"
    min: 0
    max: 500
  co:
    outlier_method: "iqr"
    min: 0
    max: 200
  temperature:
    outlier_method: "zscore"
    zscore_threshold: 3.0
    min: -10
    max: 55
  humidity:
    outlier_method: "clip"
    min: 0
    max: 100
  pressure:
    outlier_method: "clip"
    min: 870
    max: 1085
  wind_speed:
    outlier_method: "clip"
    min: 0
    max: 80
